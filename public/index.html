<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天M管理系統</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div id="app" class="app hidden">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">LineageManage</div>
      <nav id="nav"></nav>
    </aside>
    <div class="main">
      <header class="topbar">
        <button id="menuBtn" class="icon-btn">☰</button>
        <div class="topbar-right">
          <div class="user-chip">
            <span id="userAccount"></span>
            <span id="userClass" class="badge"></span>
          </div>
          <span id="userGroup" class="muted"></span>
          <button id="logoutBtn" class="btn ghost">登出</button>
        </div>
      </header>
      <main id="page" class="page"></main>
    </div>
  </div>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
